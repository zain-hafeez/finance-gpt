[pytest]
; Default test paths — only unit tests run by default
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

; Skip integration folder unless explicitly called
addopts = --ignore=tests/integration

; Custom markers so you can label and filter tests
markers =
    integration: marks tests as integration tests (real LLM calls)
    slow: marks tests that take more than 5 seconds
    unit: marks tests as fast unit tests with mocks